name: Auto Close Issues

on:
  issues:
    types: [labeled]

jobs:
  close-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.label.name, 'completed') || contains(github.event.label.name, 'wontfix')
    
    steps:
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = context.payload.label.name;
            const issueNumber = context.payload.issue.number;
            
            let stateReason = '';
            let comment = '';
            
            if (label === 'completed') {
              stateReason = 'completed';
              comment = '✅ This issue has been automatically closed because it was marked as completed.';
            } else if (label === 'wontfix') {
              stateReason = 'not_planned';
              comment = '🚫 This issue has been automatically closed because it was marked as wontfix.';
            }
            
            // Add comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });
            
            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: stateReason
            });
            
            console.log(`Issue #${issueNumber} closed with reason: ${stateReason}`);
